# Identidad del proyecto en SonarQube/SonarCloud.
# Ajusta sonar.projectKey y sonar.projectName segun tu instancia.
sonar.projectKey=mlops_pipeline
sonar.projectName=mlops_pipeline
sonar.projectVersion=1.0

# Codigo a analizar.
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Excluir notebooks y artefactos generados del analisis estatico.
sonar.exclusions=**/*.ipynb,**/__pycache__/**,**/monitoring_outputs/**

# Excluir tests de la cobertura si no existe suite formal aun.
sonar.coverage.exclusions=**/model_deploy.py